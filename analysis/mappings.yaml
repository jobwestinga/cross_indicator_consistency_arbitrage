# Consistency-arbitrage rule mappings (machine-readable).
#
# Links each economic-identity rule (see strats.txt) to the ForecastTrader
# markets it is computed from and the FRED series that provide realized
# ground truth. Markets are referenced by `market_name`; the conid is resolved
# at runtime from the bundle's markets.csv (conids can change, names are stable).
#
# This is the single source of truth for what-pairs-with-what. Edit here, not
# in code. NOTE: the project is at the EXPLORATORY/TESTING stage - these rules
# are hypotheses to validate, not a proven trading signal.

defaults:
  # implied-probability band: drop degenerate near-0/near-1 contracts that carry
  # no signal. Deliberately tolerant (0.001-0.999) so we keep tail-ish but still
  # informative contracts (matters for tail rules like Sahm/recession).
  prob_band: [0.001, 0.999]
  resample_freq: "1h"   # common grid; markets sit on slightly offset clocks

rules:
  phillips:
    description: >
      Phillips curve. Tight labor (low unemployment) should coincide with
      higher inflation. Inconsistency = unemployment and inflation priced in the
      SAME direction (both hot = stagflation corner, both cold = goldilocks
      corner), neither of which Phillips allows without a structural story.
    status: implemented
    indicators:
      inflation:
        market_name: "US Core CPI"
        fred_series: "CPILFESL"
        direction: "higher = more inflation pressure"
      labor:
        market_name: "US Unemployment Rate"
        fred_series: "UNRATE"
        direction: "higher = looser labor (more unemployment)"
    logic:
      # inconsistency score = z(inflation_prob) * z(unemployment_prob)
      # positive => same-direction => Phillips-inconsistent
      score: "z_inflation * z_unemployment"
      flag_when: "score > 1.0"   # both ~1 sigma in the inconsistent corner

  sahm:
    description: >
      Sahm rule. A rise in unemployment (3mo avg >= 0.5pp above its trailing
      12mo low) signals recession. Inconsistency = Sahm-style unemployment rise
      implied by the unemployment market while the Recession market keeps
      recession probability very low (or the reverse).
    status: implemented_basic
    # Recession market is too thin for a survival-ladder median; use the
    # single-strike probability signal instead.
    signal: prob
    indicators:
      unemployment:
        market_name: "US Unemployment Rate"
        fred_series: "UNRATE"
        direction: "higher = recession risk"
      recession:
        market_name: "US Recession"
        fred_series: "USREC"
        direction: "higher = recession priced"
    logic:
      score: "z_unemployment - z_recession"
      flag_when: "abs(score) > 1.5"
    notes: >
      Data-starved: Recession market is thin and has NO projected_probabilities,
      so it MUST be read from contract_history. Treat results as low-power.

  # --- not yet implemented; specs here so the engine/config is complete ---
  taylor:
    description: "Taylor rule. Inflation + slack -> policy rate."
    status: planned
    indicators:
      inflation: {market_name: "US Consumer Price Index Yearly", fred_series: "CPIAUCSL"}
      labor: {market_name: "US Unemployment Rate", fred_series: "UNRATE"}
      policy: {market_name: "US Fed Funds Target Rate", fred_series: "FEDFUNDS"}

  okun:
    description: "Okun's law. Growth <-> unemployment."
    status: planned
    indicators:
      growth: {market_name: "US Real GDP", fred_series: "GDPC1"}
      labor: {market_name: "US Unemployment Rate", fred_series: "UNRATE"}

  beveridge:
    description: "Beveridge curve. Vacancies <-> unemployment."
    status: planned
    indicators:
      vacancies: {market_name: "JOLTS", fred_series: "JTSJOL"}
      labor: {market_name: "US Unemployment Rate", fred_series: "UNRATE"}

  uip:
    description: "Uncovered interest parity. Rate differential <-> FX."
    status: planned
    indicators:
      policy: {market_name: "US Fed Funds Target Rate", fred_series: "FEDFUNDS"}
      fx: {market_name: "US Dollar to Japanese Yen Exchange Rate", fred_series: "DEXJPUS"}
