name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install analysis + test deps
        # collector deps (psycopg, pydantic-settings, ...) are intentionally
        # not installed: their tests skip, matching the local dev setup.
        run: |
          pip install -r requirements-analysis.txt pytest ruff
      - name: Lint
        run: python3 -m ruff check analysis/ src/ tests/
      - name: Run test suite
        run: python3 -m pytest tests/ -q
